version: '3.8'

services:
  # PostgreSQL with PostGIS extension
  postgres:
    image: postgis/postgis:16-3.4
    container_name: gis-platform-postgres
    environment:
      POSTGRES_DB: gis_platform
      POSTGRES_USER: gis_user
      POSTGRES_PASSWORD: gis_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations
      - ./database/verify_schema.sql:/docker-entrypoint-initdb.d/verify_schema.sql
      - ./scripts:/scripts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gis_user -d gis_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: gis-platform-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # IPFS for distributed evidence storage
  ipfs:
    image: ipfs/kubo:latest
    container_name: gis-platform-ipfs
    ports:
      - "4001:4001"     # P2P
      - "5001:5001"     # API
      - "8080:8080"     # Gateway
    volumes:
      - ipfs_data:/data/ipfs
    environment:
      IPFS_PROFILE: server
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Substrate blockchain node (development mode)
  substrate:
    image: parity/substrate:latest
    container_name: gis-platform-substrate
    command: --dev --ws-external --rpc-external --rpc-cors all
    ports:
      - "9944:9944"     # WebSocket
      - "9933:9933"     # RPC
      - "30333:30333"   # P2P
    volumes:
      - substrate_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9933/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Rust Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: gis-platform-backend
    environment:
      DATABASE_URL: postgresql://gis_user:gis_password@postgres:5432/gis_platform
      REDIS_URL: redis://redis:6379
      IPFS_API_URL: http://ipfs:5001
      SUBSTRATE_WS_URL: ws://substrate:9944
      RUST_LOG: info
      JWT_SECRET: change-this-in-production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ipfs:
        condition: service_healthy
      substrate:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped

  # Julia Analytics Engine
  analytics:
    build:
      context: .
      dockerfile: analytics/Dockerfile
    container_name: gis-platform-analytics
    environment:
      DATABASE_URL: postgresql://gis_user:gis_password@postgres:5432/gis_platform
      GRPC_PORT: 50051
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./analytics:/app/analytics
      - analytics_models:/app/models
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ipfs_data:
  substrate_data:
  analytics_models:
